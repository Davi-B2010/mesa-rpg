<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shadow Slave - Deuses e Daemons entre nós</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>

body{
margin:0;
background:black;
color:red;
font-family:Segoe UI;
overflow:hidden;
}

.tela{
display:none;
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
}

.ativa{
display:flex;
}

.logo-container{
text-align:center;
margin-bottom:30px;
}

.logo{
font-size:72px;
margin:0;
font-family:Georgia, serif;
font-weight:bold;
letter-spacing:4px;
color:#ff0000;
text-shadow:
0 0 5px #ff0000,
0 0 10px #990000,
0 0 20px #660000;
}

.sublogo{
margin-top:-5px;
font-size:24px;
font-style:italic;
color:#9b9b9b;
letter-spacing:1px;
}

input{
background:#111;
border:1px solid red;
color:red;
padding:10px;
margin:5px;
width:260px;
outline:none;
}

button{
background:black;
color:red;
border:1px solid red;
padding:10px;
margin:5px;
cursor:pointer;
transition:0.2s;
font-weight:bold;
}

button:hover{
background:red;
color:black;
}

.container{
display:grid;
grid-template-columns:260px 1fr;
width:100vw;
height:100vh;
}

.sidebar{
background:#050505;
border-right:2px solid red;
padding:15px;
overflow:auto;
z-index:50;
}

.player{
padding:6px;
border-bottom:1px solid #222;
}

.mesa{
position:relative;
background:black;
overflow:hidden;
}

.mapa-box{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:92%;
height:92%;
border:2px solid red;
background:#111;
overflow:hidden;
}

#mapaImg{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:contain;
display:none;
pointer-events:none;
user-select:none;
z-index:1;
}

.overlay{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:black;
border:1px solid red;
padding:20px;
border-radius:10px;
z-index:10;
text-align:center;
}

.token{
width:45px;
height:45px;
border-radius:50%;
background:red;
color:black;
font-weight:bold;
display:flex;
align-items:center;
justify-content:center;
position:absolute;
cursor:grab;
user-select:none;
z-index:100;
border:2px solid black;
}

.popup{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:black;
border:2px solid red;
padding:20px;
font-size:24px;
border-radius:10px;
display:none;
z-index:999;
}

</style>
</head>

<body>

<!-- LOGIN -->

<div id="loginTela" class="tela ativa">

<div class="logo-container">
<h1 class="logo">SHADOW SLAVE</h1>
<p class="sublogo">"Deuses e Daemons entre nós"</p>
</div>

<input id="nick" placeholder="Nickname">

<input id="email" type="email" placeholder="Email">

<input id="senha" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>

<button onclick="registrar()">Criar Conta</button>

</div>

<!-- MENU -->

<div id="menuTela" class="tela">

<div class="logo-container">
<h1 class="logo">SHADOW SLAVE</h1>
<p class="sublogo">"Deuses e Daemons entre nós"</p>
</div>

<button onclick="criarSala()">Criar Sala</button>

<input id="codigoSala" placeholder="Código da sala">

<button onclick="entrarSala()">Entrar Sala</button>

</div>

<!-- MESA -->

<div id="mesaTela" class="tela">

<div class="container">

<!-- SIDEBAR -->

<div class="sidebar">

<div id="dadosArea">

<h3>🎲 Dados</h3>

<button onclick="rolar(20)">D20</button>
<button onclick="rolar(12)">D12</button>
<button onclick="rolar(10)">D10</button>
<button onclick="rolar(8)">D8</button>
<button onclick="rolar(6)">D6</button>
<button onclick="rolar(4)">D4</button>

<hr>

</div>

<h3>📜 Sala</h3>

<div id="codigoMostrado"></div>

<hr>

<div id="areaMestre"></div>

</div>

<!-- MESA -->

<div class="mesa">

<div id="mapaBox" class="mapa-box">

<img id="mapaImg">

<div id="botaoMapa" class="overlay">

<input type="file" id="mapaUpload" accept="image/*">

<p>Enviar mapa</p>

</div>

</div>

</div>

</div>

</div>

<!-- POPUP -->

<div id="popup" class="popup"></div>

<script>

const client = supabase.createClient(
"https://nbgnxxqmpuzucmctxejk.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5iZ254eHFtcHV6dWNtY3R4ZWprIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1Nzc4MDIsImV4cCI6MjA5MzE1MzgwMn0.ZtFES_d4gu7Tum9MwQrZtaXUPLr8jDdjq1zmenxbwzo"
);

let nick;
let sala;
let isMestre=false;

/* TELAS */

function mostrar(id){

document.querySelectorAll(".tela")
.forEach(t=>t.classList.remove("ativa"));

document.getElementById(id)
.classList.add("ativa");

}

/* REGISTRAR */

async function registrar(){

const email=document.getElementById("email").value;

const senha=document.getElementById("senha").value;

const {error}=await client.auth.signUp({
email,
password:senha
});

if(error){
alert(error.message);
return;
}

alert("Conta criada");

}

/* LOGIN */

async function login(){

nick=document.getElementById("nick").value;

const email=document.getElementById("email").value;

const senha=document.getElementById("senha").value;

const {error}=await client.auth.signInWithPassword({
email,
password:senha
});

if(error){
alert(error.message);
return;
}

mostrar("menuTela");

}

/* CÓDIGO */

function gerarCodigo(){

return Math.random()
.toString(36)
.substring(2,8)
.toUpperCase();

}

/* CRIAR SALA */

async function criarSala(){

sala=gerarCodigo();

isMestre=true;

await client
.from("salas")
.insert({
nome:sala,
mestre:nick
});

abrirMesa();

}

/* ENTRAR SALA */

async function entrarSala(){

sala=document.getElementById("codigoSala").value;

const {data,error}=await client
.from("salas")
.select("*")
.eq("nome",sala)
.single();

if(error || !data){

alert("Sala não encontrada");

return;

}

isMestre=false;

/* REGISTRAR PLAYER */

await client
.from("players")
.insert({
sala:sala,
nick:nick
});

abrirMesa();

}

/* ABRIR MESA */

function abrirMesa(){

mostrar("mesaTela");

document.getElementById("codigoMostrado")
.innerHTML=`Código da sala:<br><b>${sala}</b>`;

if(isMestre){

document.getElementById("areaMestre")
.innerHTML=`

<h3>👑 Mestre</h3>

<input id="nomeToken" placeholder="Nome do Token">

<button onclick="criarToken()">
Criar Token
</button>

<hr>

<h3>👥 Players</h3>

<div id="listaPlayers"></div>

`;

carregarPlayers();

setInterval(carregarPlayers,2000);

}else{

/* PLAYER NÃO VÊ DADOS */

document.getElementById("dadosArea")
.style.display="none";

/* PLAYER NÃO VÊ UPLOAD */

document.getElementById("botaoMapa")
.style.display="none";

}

document.getElementById("mapaUpload")
.onchange=uploadMapa;

carregarMapa();
carregarTokens();

setInterval(carregarMapa,2000);

}

/* PLAYERS */

async function carregarPlayers(){

const {data,error}=await client
.from("players")
.select("*")
.eq("sala",sala);

if(error)return;

const lista=document.getElementById("listaPlayers");

if(!lista)return;

lista.innerHTML="";

data.forEach(player=>{

lista.innerHTML += `
<div class="player">
${player.nick}
</div>
`;

});

}

/* MAPA */

async function uploadMapa(e){

const file=e.target.files[0];

if(!file)return;

const nomeArquivo=Date.now()+"_"+file.name;

const caminho=sala+"/"+nomeArquivo;

const {error}=await client.storage
.from("mapas")
.upload(caminho,file,{upsert:true});

if(error){

alert(error.message);

return;

}

const {data}=client.storage
.from("mapas")
.getPublicUrl(caminho);

await client
.from("arquivos")
.insert({
sala:sala,
nome:nomeArquivo,
url:data.publicUrl,
tipo:"mapa"
});

carregarMapa();

}

/* CARREGAR MAPA */

async function carregarMapa(){

const {data}=await client
.from("arquivos")
.select("*")
.eq("sala",sala)
.eq("tipo","mapa")
.order("id",{ascending:false})
.limit(1);

if(data && data[0]){

const img=document.getElementById("mapaImg");

img.src=data[0].url+"?"+Date.now();

img.style.display="block";

document.getElementById("botaoMapa")
.style.display="none";

}

}

/* TOKEN */

async function criarToken(){

const nome=document.getElementById("nomeToken").value;

if(!nome)return;

await client
.from("tokens")
.insert({
sala:sala,
dono:nome,
x:100,
y:100
});

carregarTokens();

}

/* TOKENS */

async function carregarTokens(){

const {data}=await client
.from("tokens")
.select("*")
.eq("sala",sala);

document.querySelectorAll(".token")
.forEach(t=>t.remove());

data.forEach(token=>{

const el=document.createElement("div");

el.className="token";

el.style.left=token.x+"px";
el.style.top=token.y+"px";

el.innerText=token.dono[0];

mapaBox.appendChild(el);

/* TODOS PLAYERS PODEM MOVER */

let dragging=false;

let currentX=token.x;
let currentY=token.y;

el.addEventListener("mousedown",(e)=>{

e.preventDefault();
e.stopPropagation();

dragging=true;

const rect=mapaBox.getBoundingClientRect();

const offsetX=e.clientX-el.getBoundingClientRect().left;
const offsetY=e.clientY-el.getBoundingClientRect().top;

function mover(ev){

if(!dragging)return;

currentX=ev.clientX-rect.left-offsetX;
currentY=ev.clientY-rect.top-offsetY;

el.style.left=currentX+"px";
el.style.top=currentY+"px";

}

document.addEventListener("mousemove",mover);

document.addEventListener("mouseup",async()=>{

dragging=false;

await client
.from("tokens")
.update({
x:currentX,
y:currentY
})
.eq("id",token.id);

document.removeEventListener("mousemove",mover);

},{once:true});

});

});

clearTimeout(window.tokenReload);

window.tokenReload=setTimeout(()=>{
carregarTokens();
},1500);

}

/* DADOS */

async function rolar(max){

if(!isMestre)return;

const valor=Math.floor(Math.random()*max)+1;

mostrarDado("D"+max+" → "+valor);

await client
.from("dados")
.insert({
sala:sala,
valor:valor,
tipo:"D"+max
});

}

/* POPUP */

function mostrarDado(texto){

if(!isMestre)return;

const popup=document.getElementById("popup");

popup.innerText=texto;

popup.style.display="block";

clearTimeout(window.popupTimer);

window.popupTimer=setTimeout(()=>{

popup.style.display="none";

},10000);

}

</script>

</body>
</html>
