<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Shadow Slave - "Deuses e Daemons entre nós"</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body{
margin:0;
background:black;
color:red;
font-family:Segoe UI;
overflow:hidden;
}

.tela{
display:none;
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
}

.ativa{
display:flex;
}

/* LOGO */
.logo-container{
text-align:center;
margin-bottom:30px;
}

.logo{
font-size:72px;
margin:0;
font-family:Georgia, serif;
font-weight:bold;
letter-spacing:4px;
color:#ff0000;
text-shadow:
0 0 5px #ff0000,
0 0 10px #990000,
0 0 20px #660000;
}

.sublogo{
margin-top:-5px;
font-size:24px;
font-style:italic;
color:#9b9b9b;
letter-spacing:1px;
}

/* INPUTS */
input{
background:#111;
border:1px solid red;
color:red;
padding:10px;
margin:5px;
width:250px;
}

button{
background:black;
color:red;
border:1px solid red;
padding:10px;
margin:5px;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:red;
color:black;
}

/* MESA */
.container{
display:grid;
grid-template-columns:260px 1fr;
height:100vh;
width:100vw;
}

.sidebar{
background:#050505;
border-right:2px solid red;
padding:10px;
overflow:auto;
}

.sidebar h3{
color:red;
}

.mesa{
position:relative;
background:#000;
overflow:hidden;
}

.mapa-box{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:90%;
height:90%;
border:2px solid red;
background:#111;
overflow:hidden;
}

#mapaImg{
width:100%;
height:100%;
object-fit:contain;
display:none;
}

.overlay{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:black;
border:1px solid red;
padding:15px;
border-radius:10px;
z-index:10;
}

/* TOKEN */
.token{
width:40px;
height:40px;
border-radius:50%;
position:absolute;
display:flex;
align-items:center;
justify-content:center;
background:red;
color:black;
font-weight:bold;
cursor:grab;
user-select:none;
z-index:20;
}

/* POPUP DADO */
.popup{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:black;
border:2px solid red;
padding:20px;
font-size:22px;
border-radius:10px;
display:none;
z-index:999;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginTela" class="tela ativa">

<div class="logo-container">
<h1 class="logo">SHADOW SLAVE</h1>
<p class="sublogo">"Deuses e Daemons entre nós"</p>
</div>

<input id="nick" placeholder="Nickname">
<input id="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>

</div>

<!-- MENU -->
<div id="menuTela" class="tela">

<div class="logo-container">
<h1 class="logo">SHADOW SLAVE</h1>
<p class="sublogo">"Deuses e Daemons entre nós"</p>
</div>

<button onclick="criarSala()">Criar Sala</button>

<input id="codigoSala" placeholder="Código da sala">

<button onclick="entrarSala()">Entrar Sala</button>

</div>

<!-- MESA -->
<div id="mesaTela" class="tela">

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">

<h3>🎲 Dados</h3>

<button onclick="rolar(20)">D20</button>
<button onclick="rolar(12)">D12</button>
<button onclick="rolar(10)">D10</button>
<button onclick="rolar(8)">D8</button>
<button onclick="rolar(6)">D6</button>
<button onclick="rolar(4)">D4</button>

<hr>

<h3>📜 Sala</h3>

<div id="codigoMostrado"></div>

<hr>

<div id="areaMestre"></div>

</div>

<!-- MESA -->
<div class="mesa">

<div id="mapaBox" class="mapa-box">

<img id="mapaImg">

<div id="botaoMapa" class="overlay">
<input type="file" id="mapaUpload" accept="image/*">
<p>Enviar mapa</p>
</div>

</div>

</div>

</div>

</div>

<!-- POPUP -->
<div id="popup" class="popup"></div>

<script>
const client = supabase.createClient(
"https://nbgnxxqmpuzucmctxejk.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5iZ254eHFtcHV6dWNtY3R4ZWprIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1Nzc4MDIsImV4cCI6MjA5MzE1MzgwMn0.ZtFES_d4gu7Tum9MwQrZtaXUPLr8jDdjq1zmenxbwzo"
);

let nick;
let sala;
let isMestre=false;
let movendoToken=false;

// TROCAR TELA
function mostrar(id){
document.querySelectorAll(".tela")
.forEach(t=>t.classList.remove("ativa"));

document.getElementById(id)
.classList.add("ativa");
}

// LOGIN
async function login(){

nick=document.getElementById("nick").value;

if(!nick){
alert("Digite um nickname");
return;
}

mostrar("menuTela");
}

// GERAR CÓDIGO
function gerarCodigo(){
return Math.random().toString(36)
.substring(2,8)
.toUpperCase();
}

// CRIAR SALA
async function criarSala(){

sala=gerarCodigo();
isMestre=true;

await client.from("salas").insert({
nome:sala,
mestre:nick
});

abrirMesa();
}

// ENTRAR SALA
async function entrarSala(){

sala=document.getElementById("codigoSala").value;

const {data,error}=await client
.from("salas")
.select("*")
.eq("nome",sala)
.single();

if(error || !data){
alert("Sala não encontrada");
return;
}

isMestre=false;

abrirMesa();
}

// ABRIR MESA
function abrirMesa(){

mostrar("mesaTela");

document.getElementById("codigoMostrado")
.innerHTML=`Código da sala:<br><b>${sala}</b>`;

if(!isMestre){

document.getElementById("botaoMapa")
.style.display="none";

}else{

document.getElementById("areaMestre")
.innerHTML=`

<h3>👑 Mestre</h3>

<input id="nomeToken" placeholder="Nome Token">

<button onclick="criarToken()">
Criar Token
</button>

`;

}

document.getElementById("mapaUpload")
.onchange=uploadMapa;

atualizar();
}

// MAPA
async function uploadMapa(e){

const file=e.target.files[0];

if(!file)return;

const nomeArquivo=Date.now()+"_"+file.name;

const caminho=sala+"/"+nomeArquivo;

const {error:uploadError}=await client.storage
.from("mapas")
.upload(caminho,file,{upsert:true});

if(uploadError){
alert(uploadError.message);
return;
}

const {data:urlData}=client.storage
.from("mapas")
.getPublicUrl(caminho);

const url=urlData.publicUrl;

await client.from("arquivos")
.insert({
sala:sala,
nome:nomeArquivo,
url:url,
tipo:"mapa"
});

const img=document.getElementById("mapaImg");

img.src=url+"?t="+Date.now();
img.style.display="block";

document.getElementById("botaoMapa")
.style.display="none";
}

// TOKEN
async function criarToken(){

const nome=document.getElementById("nomeToken").value;

if(!nome)return;

await client.from("tokens")
.insert({
sala:sala,
dono:nome,
x:100,
y:100,
cor:"red"
});
}

// DADOS
async function rolar(max){

const valor=Math.floor(Math.random()*max)+1;

mostrarDado("D"+max+" → "+valor);

await client.from("dados")
.insert({
sala:sala,
valor:valor,
tipo:"D"+max
});
}

// POPUP
function mostrarDado(texto){

const popup=document.getElementById("popup");

popup.innerText=texto;

popup.style.display="block";

clearTimeout(window.popupTimer);

window.popupTimer=setTimeout(()=>{
popup.style.display="none";
},10000);
}

// LOOP
function atualizar(){

if(window.loopMesa){
clearInterval(window.loopMesa);
}

window.loopMesa=setInterval(async()=>{

// NÃO atualizar enquanto move
if(movendoToken)return;

// MAPA
const {data:mapas}=await client
.from("arquivos")
.select("*")
.eq("sala",sala)
.eq("tipo","mapa")
.order("id",{ascending:false})
.limit(1);

if(mapas && mapas[0]){

const img=document.getElementById("mapaImg");

if(!img.src.includes(mapas[0].url)){

img.src=mapas[0].url+"?t="+Date.now();
img.style.display="block";

document.getElementById("botaoMapa")
.style.display="none";

}

}

// TOKENS
const {data:tokens}=await client
.from("tokens")
.select("*")
.eq("sala",sala);

document.querySelectorAll(".token")
.forEach(t=>t.remove());

tokens.forEach(token=>{

const el=document.createElement("div");

el.className="token";

el.style.left=token.x+"px";
el.style.top=token.y+"px";

el.innerText=token.dono[0];

mapaBox.appendChild(el);

// ARRASTAR
if(isMestre || token.dono===nick){

el.onmousedown=(ev)=>{

ev.preventDefault();

movendoToken=true;

document.onmousemove=(e)=>{

const rect=mapaBox.getBoundingClientRect();

let x=e.clientX-rect.left-20;
let y=e.clientY-rect.top-20;

el.style.left=x+"px";
el.style.top=y+"px";

};

document.onmouseup=async(e)=>{

const rect=mapaBox.getBoundingClientRect();

let x=e.clientX-rect.left-20;
let y=e.clientY-rect.top-20;

await client.from("tokens")
.update({
x:x,
y:y
})
.eq("id",token.id);

document.onmousemove=null;
document.onmouseup=null;

movendoToken=false;

};

};

}

});

},1500);

}
</script>

</body>
</html>
