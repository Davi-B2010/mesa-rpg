<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Mesas Online</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body{margin:0;background:#0f172a;color:white;font-family:Segoe UI}
.tela{display:none;height:100vh;justify-content:center;align-items:center;flex-direction:column}
.ativa{display:flex}

.container{display:grid;grid-template-columns:250px 1fr;height:100vh}
.sidebar{background:#020617;padding:10px;overflow:auto}
.mesa{display:flex;justify-content:center;align-items:center}

/* MAPA */
.mapa-box{
width:90%;
height:90%;
background:#222;
position:relative;
border-radius:10px;
display:flex;
justify-content:center;
align-items:center;
}

#mapaImg{
max-width:100%;
max-height:100%;
position:absolute;
}

/* BOTÃO MESTRE */
.overlay{
position:absolute;
background:rgba(0,0,0,0.7);
padding:20px;
border-radius:10px;
text-align:center;
cursor:pointer;
}

/* TOKEN */
.token{
width:40px;height:40px;border-radius:50%;
position:absolute;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
cursor:grab;
}

/* POPUP */
.popup{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:black;
padding:20px;
border-radius:10px;
font-size:22px;
display:none;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginTela" class="tela ativa">
<h2>Mesas Online</h2>
<input id="nick" placeholder="Nickname">
<input id="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">
<button onclick="registrar()">Criar Conta</button>
<button onclick="login()">Entrar</button>
<div id="msg"></div>
</div>

<!-- MENU -->
<div id="menuTela" class="tela">
<h2>Menu</h2>
<button onclick="mostrar('criarTela')">Criar Sala</button>
<button onclick="mostrar('entrarTela')">Entrar Sala</button>
</div>

<!-- CRIAR -->
<div id="criarTela" class="tela">
<input id="nomeSala" placeholder="Nome sala">
<button onclick="criarSala()">Criar</button>
</div>

<!-- ENTRAR -->
<div id="entrarTela" class="tela">
<input id="buscarSala" placeholder="Nome sala">
<button onclick="entrarSala()">Entrar</button>
</div>

<!-- MESA -->
<div id="mesaTela" class="tela">
<div class="container">

<div class="sidebar">

<h3>🎲 Dados</h3>
<button onclick="rolar(20)">D20</button>
<button onclick="rolar(12)">D12</button>
<button onclick="rolar(10)">D10</button>
<button onclick="rolar(8)">D8</button>
<button onclick="rolar(6)">D6</button>
<button onclick="rolar(4)">D4</button>

<hr>

<h3>📂 PDFs</h3>
<div id="listaPDF"></div>

<hr>

<div id="areaMestre"></div>

</div>

<div class="mesa">
<div id="mapaBox" class="mapa-box">

<img id="mapaImg">

<div id="botaoMapa" class="overlay">
<input type="file" id="mapaUpload">
<p>Enviar mapa</p>
</div>

</div>
</div>

</div>
</div>

<div id="popup" class="popup"></div>

<script>
const { createClient } = window.supabase;

const client = createClient(
"https://nbgnxxqmpuzucmctxejk.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5iZ254eHFtcHV6dWNtY3R4ZWprIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1Nzc4MDIsImV4cCI6MjA5MzE1MzgwMn0.ZtFES_d4gu7Tum9MwQrZtaXUPLr8jDdjq1zmenxbwzo"
);

let user,nick,sala,isMestre=false;

// UI
function mostrar(id){
document.querySelectorAll(".tela").forEach(t=>t.classList.remove("ativa"));
document.getElementById(id).classList.add("ativa");
}

// AUTH
async function registrar(){
const {data,error}=await client.auth.signUp({
email:email.value,password:senha.value
});
if(error)return msg(error.message);
msg("Conta criada");
}

async function login(){
const {data,error}=await client.auth.signInWithPassword({
email:email.value,password:senha.value
});
if(error)return msg(error.message);

user=data.user;
nick=document.getElementById("nick").value;
mostrar("menuTela");
}

// SALA
async function criarSala(){
sala=nomeSala.value;
isMestre=true;

await client.from("salas").insert({
nome:sala,
mestre:nick
});

abrirMesa();
}

async function entrarSala(){
sala=buscarSala.value;

const {data}=await client.from("salas")
.select("*").eq("nome",sala).single();

if(!data)return alert("Sala não existe");

isMestre=data.mestre===nick;

abrirMesa();
}

// MESA
function abrirMesa(){
mostrar("mesaTela");

if(!isMestre){
document.getElementById("botaoMapa").style.display="none";
}else{
document.getElementById("areaMestre").innerHTML = `
<h3>👑 Mestre</h3>
<input id="nomeToken" placeholder="Nome do jogador">
<input id="corToken" placeholder="Cor (ex: red)">
<button onclick="criarToken()">Criar Token</button>
`;
}

document.getElementById("mapaUpload").onchange=uploadMapa;

atualizar();
}

// UPLOAD MAPA
async function uploadMapa(e){
const file=e.target.files[0];

await client.storage.from("mapas")
.upload(sala+"/"+file.name,file,{upsert:true});

const {data}=client.storage.from("mapas")
.getPublicUrl(sala+"/"+file.name);

await client.from("arquivos").insert({
sala,nome:file.name,url:data.publicUrl,tipo:"mapa"
});
}

// TOKEN
async function criarToken(){
const nome = document.getElementById("nomeToken").value;
const cor = document.getElementById("corToken").value || "red";

if(!nome) return alert("Digite o nome");

await client.from("tokens").insert({
sala: sala,
dono: nome,
x: 100,
y: 100,
cor: cor
});
}

// DADOS
async function rolar(max){
if(!isMestre)return;

const valor=Math.floor(Math.random()*max)+1;

await client.from("dados").insert({
sala,valor,tipo:"D"+max
});
}

// POPUP
function popup(txt){
const p=document.getElementById("popup");
p.innerText=txt;
p.style.display="block";
setTimeout(()=>p.style.display="none",10000);
}

// LOOP
function atualizar(){
setInterval(async()=>{

// MAPA
const {data:arq}=await client.from("arquivos")
.select("*").eq("sala",sala).eq("tipo","mapa");

if(arq[0]){
document.getElementById("mapaImg").src=arq[0].url;
}

// TOKENS
const {data:tok} = await client.from("tokens")
.select("*").eq("sala",sala);

document.querySelectorAll(".token").forEach(t=>t.remove());

tok.forEach(t=>{
const el = document.createElement("div");
el.className="token";
el.style.left = t.x + "px";
el.style.top = t.y + "px";
el.style.background = t.cor;
el.innerText = t.dono[0];

mapaBox.appendChild(el);

if(t.dono === nick){
el.onmousedown = ()=>{
document.onmousemove = async e=>{
let x = e.pageX - mapaBox.offsetLeft;
let y = e.pageY - mapaBox.offsetTop;

el.style.left = x+"px";
el.style.top = y+"px";

await client.from("tokens")
.update({x,y})
.eq("id",t.id);
};
document.onmouseup = ()=>document.onmousemove=null;
};
}

});

// DADOS
const {data:d}=await client.from("dados")
.select("*").eq("sala",sala)
.order("id",{ascending:false}).limit(1);

if(d[0]) popup(d[0].tipo+" → "+d[0].valor);

},1500);
}

const msg=t=>document.getElementById("msg").innerText=t;
</script>

</body>
</html>
