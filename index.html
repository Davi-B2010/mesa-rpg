<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Mesas Online</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body{
margin:0;
background:black;
color:red;
font-family:Segoe UI;
overflow:hidden;
}

.tela{
display:none;
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column
}

.ativa{display:flex}

.container{
display:grid;
grid-template-columns:260px 1fr;
height:100vh;
}

.sidebar{
background:#000;
border-right:2px solid red;
padding:10px;
}

.sidebar button{
background:black;
color:red;
border:1px solid red;
padding:8px;
margin:2px;
cursor:pointer;
}

.mesa{
position:relative;
}

.mapa-box{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:90%;
height:90%;
border:2px solid red;
}

#mapaImg{
width:100%;
height:100%;
object-fit:contain;
}

.overlay{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:black;
border:1px solid red;
padding:10px;
}

.token{
width:40px;
height:40px;
border-radius:50%;
position:absolute;
display:flex;
align-items:center;
justify-content:center;
background:red;
color:black;
cursor:grab;
}

.popup{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:black;
border:2px solid red;
padding:15px;
display:none;
}
</style>
</head>

<body>

<div id="loginTela" class="tela ativa">
<input id="nick" placeholder="Nickname">
<input id="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
</div>

<div id="menuTela" class="tela">
<button onclick="criarSala()">Criar Sala</button>
<input id="codigoSala" placeholder="Código da sala">
<button onclick="entrarSala()">Entrar Sala</button>
</div>

<div id="mesaTela" class="tela">
<div class="container">

<div class="sidebar">
<h3>Dados</h3>
<button onclick="rolar(20)">D20</button>
<button onclick="rolar(12)">D12</button>
<button onclick="rolar(10)">D10</button>

<h3 id="codigoMostrado"></h3>

<div id="areaMestre"></div>
</div>

<div class="mesa">
<div id="mapaBox" class="mapa-box">
<img id="mapaImg">

<div id="botaoMapa" class="overlay">
<input type="file" id="mapaUpload">
</div>

</div>
</div>

</div>
</div>

<div id="popup" class="popup"></div>

<script>
const client = supabase.createClient(
"https://nbgnxxqmpuzucmctxejk.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
);

let nick,sala,isMestre=false,lastRollId=null;

// UI
function mostrar(id){
document.querySelectorAll(".tela").forEach(t=>t.classList.remove("ativa"));
document.getElementById(id).classList.add("ativa");
}

// LOGIN
async function login(){
nick=document.getElementById("nick").value;
mostrar("menuTela");
}

// GERAR CODIGO
function gerarCodigo(){
return Math.random().toString(36).substring(2,8);
}

// CRIAR SALA
async function criarSala(){
sala=gerarCodigo();
isMestre=true;

await client.from("salas").insert({
nome:sala,
mestre:nick
});

abrirMesa();
}

// ENTRAR SALA
async function entrarSala(){
sala=document.getElementById("codigoSala").value;

const {data}=await client.from("salas")
.select("*").eq("nome",sala).single();

if(!data)return alert("Código inválido");

isMestre=false;
abrirMesa();
}

// MESA
function abrirMesa(){
mostrar("mesaTela");

document.getElementById("codigoMostrado").innerText="Código: "+sala;

if(!isMestre){
botaoMapa.style.display="none";
}else{
areaMestre.innerHTML=`
<input id="nomeToken">
<button onclick="criarToken()">Criar Token</button>
`;
}

mapaUpload.onchange=uploadMapa;

atualizar();
}

// MAPA
async function uploadMapa(e){
const file=e.target.files[0];

await client.storage.from("mapas")
.upload(sala+"/"+file.name,file,{upsert:true});

const {data}=client.storage.from("mapas")
.getPublicUrl(sala+"/"+file.name);

await client.from("arquivos").insert({
sala,nome:file.name,url:data.publicUrl,tipo:"mapa"
});
}

// TOKEN
async function criarToken(){
await client.from("tokens").insert({
sala,
dono:nomeToken.value,
x:100,
y:100,
cor:"red"
});
}

// DADOS
async function rolar(max){
const valor=Math.floor(Math.random()*max)+1;

const {data}=await client.from("dados").insert({
sala,valor,tipo:"D"+max
}).select().single();

mostrarDado(data);
}

// MOSTRAR DADO
function mostrarDado(d){
popup.innerText=d.tipo+" → "+d.valor;
popup.style.display="block";

setTimeout(()=>{
popup.style.display="none";
},10000);
}

// LOOP
function atualizar(){
setInterval(async()=>{

// MAPA
const {data:arq}=await client.from("arquivos")
.select("*").eq("sala",sala).eq("tipo","mapa");

if(arq[0]) mapaImg.src=arq[0].url;

// TOKENS
const {data:tok}=await client.from("tokens")
.select("*").eq("sala",sala);

document.querySelectorAll(".token").forEach(t=>t.remove());

tok.forEach(t=>{
const el=document.createElement("div");
el.className="token";
el.style.left=t.x+"px";
el.style.top=t.y+"px";
el.innerText=t.dono[0];

mapaBox.appendChild(el);

// MOVER (MESTRE OU DONO)
if(isMestre || t.dono===nick){
el.onmousedown=()=>{
document.onmousemove=async e=>{
let x=e.pageX-mapaBox.offsetLeft;
let y=e.pageY-mapaBox.offsetTop;

el.style.left=x+"px";
el.style.top=y+"px";

await client.from("tokens").update({x,y}).eq("id",t.id);
};
document.onmouseup=()=>document.onmousemove=null;
};
}

});

},1500);
}
</script>

</body>
</html>
