<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Mesas Online</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body{margin:0;background:#0f172a;color:white;font-family:Segoe UI}

/* LAYOUT */
.container{
display:grid;
grid-template-columns:250px 1fr;
height:100vh;
}

.sidebar{
background:#020617;
padding:10px;
}

.mesa{
position:relative;
background:#111;
}

/* MAPA */
#mapaImg{
width:100%;
height:100%;
object-fit:cover;
position:absolute;
}

/* TOKEN */
.token{
width:40px;height:40px;
border-radius:50%;
position:absolute;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
cursor:grab;
}

/* POPUP DADO */
.popup{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:black;
padding:20px;
font-size:20px;
border-radius:10px;
display:none;
}
</style>
</head>

<body>

<div class="container">

<!-- LADO ESQUERDO -->
<div class="sidebar">

<h3>🎲 Dados</h3>
<button onclick="rolar(20)">D20</button>
<button onclick="rolar(12)">D12</button>
<button onclick="rolar(10)">D10</button>
<button onclick="rolar(8)">D8</button>
<button onclick="rolar(6)">D6</button>
<button onclick="rolar(4)">D4</button>

<hr>

<h3>📂 PDFs</h3>
<input type="file" id="pdfUpload">

<hr>

<h3>👑 Mestre</h3>
<input id="nomeToken" placeholder="Nome token">
<input id="corToken" placeholder="Cor">
<button onclick="criarToken()">Criar Token</button>

<input type="file" id="mapaUpload">

</div>

<!-- MESA -->
<div class="mesa" id="mesa">
<img id="mapaImg">
</div>

</div>

<div id="popup" class="popup"></div>

<script>
const { createClient } = window.supabase;

const client = createClient(
"https://nbgnxxqmpuzucmctxejk.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
);

let sala="teste";
let nickname="Jogador";
let isMestre=true;

// MAPA
document.getElementById("mapaUpload").onchange = e=>{
if(!isMestre) return;
const file = e.target.files[0];
const url = URL.createObjectURL(file);
document.getElementById("mapaImg").src=url;
};

// CRIAR TOKEN
async function criarToken(){
if(!isMestre) return;

await client.from("tokens").insert({
sala,
dono:nomeToken.value,
cor:corToken.value,
x:100,
y:100
});
}

// DADOS
async function rolar(max){
if(!isMestre) return;

const valor = Math.floor(Math.random()*max)+1;

await client.from("dados").insert({
sala,
valor,
tipo:"D"+max
});
}

// POPUP
function mostrarPopup(texto){
const p=document.getElementById("popup");
p.innerText=texto;
p.style.display="block";

setTimeout(()=>p.style.display="none",2000);
}

// ATUALIZAR
function atualizar(){
setInterval(async()=>{

// TOKENS
const {data:tokens}=await client.from("tokens")
.select("*").eq("sala",sala);

const mesa=document.getElementById("mesa");
mesa.innerHTML='<img id="mapaImg">';

tokens.forEach(t=>{
const el=document.createElement("div");
el.className="token";
el.style.left=t.x+"px";
el.style.top=t.y+"px";
el.style.background=t.cor;
el.innerText=t.dono[0];

mesa.appendChild(el);

// mover só dono
if(t.dono===nickname){
el.onmousedown=(ev)=>{
document.onmousemove=async e=>{
let x=e.pageX-mesa.offsetLeft;
let y=e.pageY-mesa.offsetTop;

el.style.left=x+"px";
el.style.top=y+"px";

await client.from("tokens").update({x,y}).eq("id",t.id);
};
document.onmouseup=()=>document.onmousemove=null;
};
}

});

// DADOS
const {data:d}=await client.from("dados")
.select("*").eq("sala",sala)
.order("id",{ascending:false}).limit(1);

if(d[0]){
mostrarPopup(d[0].tipo+" → "+d[0].valor);
}

},1000);
}

atualizar();
</script>

</body>
</html>
