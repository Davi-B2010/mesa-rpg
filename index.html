<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Mesas Online</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body{margin:0;font-family:Segoe UI;background:#0f172a;color:white}
.tela{display:none;height:100vh;justify-content:center;align-items:center;flex-direction:column}
.ativa{display:flex}
input,button{padding:10px;margin:5px;border-radius:6px;border:none}
button{background:#6366f1;color:white;cursor:pointer}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginTela" class="tela ativa">
<h2>Mesas Online</h2>
<input id="nickname" placeholder="Nickname">
<input id="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">
<button onclick="registrar()">Criar Conta</button>
<button onclick="login()">Entrar</button>
<div id="msg"></div>
</div>

<!-- MENU -->
<div id="menuTela" class="tela">
<h2>Menu</h2>
<button onclick="mostrar('criarSalaTela')">Criar Sala</button>
<button onclick="mostrar('entrarSalaTela')">Entrar em Sala</button>
</div>

<!-- CRIAR -->
<div id="criarSalaTela" class="tela">
<h2>Criar Sala</h2>
<input id="nomeSala" placeholder="Nome">
<input id="descSala" placeholder="Descrição">
<input id="maxSala" placeholder="Máx jogadores">
<button onclick="criarSala()">Criar</button>
</div>

<!-- ENTRAR -->
<div id="entrarSalaTela" class="tela">
<h2>Entrar</h2>
<input id="buscarSala" placeholder="Nome da sala">
<button onclick="entrarSala()">Entrar</button>
</div>

<!-- SALA -->
<div id="salaTela" class="tela">
<h2 id="tituloSala"></h2>
<div id="listaJogadores"></div>
<div id="dadosMestre"></div>
</div>

<script>
const { createClient } = window.supabase;

const client = createClient(
"https://nbgnxxqmpuzucmctxejk.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5iZ254eHFtcHV6dWNtY3R4ZWprIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1Nzc4MDIsImV4cCI6MjA5MzE1MzgwMn0.ZtFES_d4gu7Tum9MwQrZtaXUPLr8jDdjq1zmenxbwzo"
);

let user, nickname, sala, isMestre=false;

// UI
function mostrar(id){
document.querySelectorAll(".tela").forEach(t=>t.classList.remove("ativa"));
document.getElementById(id).classList.add("ativa");
}

// AUTH
async function registrar(){
const { data, error } = await client.auth.signUp({
email: email.value,
password: senha.value
});

if(error) return msg(error.message);

await client.from("jogadores").insert({
id:data.user.id,
nickname:nicknameInput.value
});

msg("Conta criada!");
}

async function login(){
const { data, error } = await client.auth.signInWithPassword({
email: email.value,
password: senha.value
});

if(error) return msg(error.message);

user = data.user;

const { data:perfil } = await client
.from("jogadores")
.select("nickname")
.eq("id",user.id)
.single();

nickname = perfil?.nickname || "Jogador";

mostrar("menuTela");
}

// SALAS
async function criarSala(){
if(!nomeSala.value) return alert("Digite o nome");

await client.from("salas").insert({
nome:nomeSala.value,
descricao:descSala.value,
max:parseInt(maxSala.value),
mestre:user.id
});

sala = nomeSala.value;
isMestre = true;

await entrarNaSala();
}

async function entrarSala(){
const nome = buscarSala.value;

const { data } = await client.from("salas")
.select("*").eq("nome",nome).single();

if(!data) return alert("Sala não existe");

sala = nome;
isMestre = data.mestre === user.id;

// evita duplicar jogador
const { data:exist } = await client.from("jogadores")
.select("*").eq("sala",sala).eq("nickname",nickname);

if(!exist.length){
await client.from("jogadores").insert({
sala,
nickname
});
}

entrarNaSala();
}

// SALA
function entrarNaSala(){
mostrar("salaTela");
tituloSala.innerText = sala;

if(isMestre){
dadosMestre.innerHTML = `
<h3>Dados</h3>
<button onclick="rolar(20)">D20</button>
<button onclick="rolar(12)">D12</button>
<button onclick="rolar(10)">D10</button>
<button onclick="rolar(8)">D8</button>
<button onclick="rolar(6)">D6</button>
<button onclick="rolar(4)">D4</button>
<div id="resultado"></div>
`;
}

atualizar();
}

// DADOS
async function rolar(max){
const valor = Math.floor(Math.random()*max)+1;

await client.from("dados").insert({
sala,
valor,
tipo:"D"+max
});
}

// UPDATE
function atualizar(){
setInterval(async ()=>{

const { data:j } = await client.from("jogadores")
.select("*").eq("sala",sala);

listaJogadores.innerHTML =
"<h3>Jogadores</h3>" +
j.map(x=>x.nickname).join("<br>");

if(isMestre){
const { data:d } = await client.from("dados")
.select("*").eq("sala",sala)
.order("id",{ascending:false}).limit(1);

if(d[0]){
resultado.innerText = d[0].tipo + ": " + d[0].valor;
}
}

},1000);
}

// helpers
const email = document.getElementById("email");
const senha = document.getElementById("senha");
const nicknameInput = document.getElementById("nickname");
const msg = (t)=>document.getElementById("msg").innerText=t;
</script>

</body>
</html>
