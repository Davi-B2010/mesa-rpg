<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Mesas Online</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body {
  margin:0;
  font-family:Segoe UI;
  background:#0f172a;
  color:white;
}

.tela {
  display:none;
  height:100vh;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}
.ativa { display:flex; }

.login-box {
  background:#020617;
  padding:30px;
  border-radius:10px;
  text-align:center;
}

/* LOGO */
.logo {
  width:120px;
  margin-bottom:10px;
}

.titulo {
  font-size:24px;
  margin-bottom:20px;
}

input {
  padding:10px;
  margin:5px;
  border:none;
  border-radius:6px;
  width:220px;
}

button {
  padding:10px;
  margin:5px;
  border:none;
  background:#6366f1;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

.container {
  display:grid;
  grid-template-columns:250px 1fr 250px;
  height:100vh;
}

.sidebar, .right {
  background:#020617;
  padding:10px;
}

.mapa {
  position:relative;
  background:#111;
}

.token {
  width:40px;
  height:40px;
  border-radius:50%;
  position:absolute;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  border:2px solid black;
  cursor:grab;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginTela" class="tela ativa">
  <div class="login-box">

    <img src="logo.png" class="logo">
    <div class="titulo">Mesas Online</div>

    <input id="email" placeholder="Email">
    <input id="senha" type="password" placeholder="Senha">

    <button onclick="registrar()">Criar Conta</button>
    <button onclick="login()">Entrar</button>

    <div id="msg"></div>
  </div>
</div>

<!-- LOBBY -->
<div id="lobbyTela" class="tela">
  <h2>Mesas Online</h2>
  <div id="user"></div>

  <input id="sala" placeholder="Nome da sala">
  <button onclick="entrarSala()">Entrar na sala</button>
</div>

<!-- JOGO -->
<div id="jogoTela" class="tela">
<div class="container">

<div class="sidebar">
  <h3>Personagem</h3>
  <input id="nome" placeholder="Nome">
  <input id="cor" placeholder="Cor">
</div>

<div id="mapa" class="mapa"></div>

<div class="right">
  <h3>🎲 Dados</h3>
  <button onclick="rolar()">Rolar D20</button>
  <div id="resultado"></div>
</div>

</div>
</div>

<script>
const { createClient } = window.supabase;

const client = createClient(
  "https://nbgnxxqmpuzucmctxejk.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5iZ254eHFtcHV6dWNtY3R4ZWprIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1Nzc4MDIsImV4cCI6MjA5MzE1MzgwMn0.ZtFES_d4gu7Tum9MwQrZtaXUPLr8jDdjq1zmenxbwzo"
);

let user = null;
let sala = null;

function mostrar(id){
  document.querySelectorAll(".tela").forEach(t=>t.classList.remove("ativa"));
  document.getElementById(id).classList.add("ativa");
}

async function registrar(){
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  const { error } = await client.auth.signUp({ email, password: senha });

  document.getElementById("msg").innerText =
    error ? error.message : "Conta criada!";
}

async function login(){
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  const { data, error } = await client.auth.signInWithPassword({ email, password: senha });

  if(error){
    document.getElementById("msg").innerText = error.message;
  } else {
    user = data.user;
    document.getElementById("user").innerText = user.email;
    mostrar("lobbyTela");
  }
}

async function verificar(){
  const { data } = await client.auth.getUser();
  user = data.user;

  if(user){
    document.getElementById("user").innerText = user.email;
    mostrar("lobbyTela");
  }
}

async function entrarSala(){
  sala = document.getElementById("sala").value;
  if(!sala) return alert("Digite a sala");

  mostrar("jogoTela");
  carregar();
}

async function rolar(){
  let valor = Math.floor(Math.random()*20)+1;

  await client.from("dados").insert({
    sala,
    usuario:user.email,
    valor
  });
}

document.getElementById("mapa").onclick = async e=>{
  await client.from("tokens").insert({
    sala,
    nome:document.getElementById("nome").value || "P",
    cor:document.getElementById("cor").value || "red",
    x:e.offsetX,
    y:e.offsetY
  });
};

function carregar(){
  client.channel("rt")
    .on('postgres_changes',{event:'*',schema:'public'},()=> atualizar())
    .subscribe();

  atualizar();
}

async function atualizar(){
  const mapa = document.getElementById("mapa");
  mapa.innerHTML="";

  const {data:tokens} = await client.from("tokens").select("*").eq("sala",sala);

  tokens.forEach(t=>{
    const el = document.createElement("div");
    el.className="token";
    el.style.left=t.x+"px";
    el.style.top=t.y+"px";
    el.style.background=t.cor;
    el.innerText=t.nome[0];

    mapa.appendChild(el);
  });

  const {data:dados} = await client.from("dados")
    .select("*").eq("sala",sala)
    .order("id",{ascending:false}).limit(1);

  if(dados && dados[0]){
    document.getElementById("resultado").innerText =
      `${dados[0].usuario}: ${dados[0].valor}`;
  }
}

verificar();
</script>

</body>
</html>
